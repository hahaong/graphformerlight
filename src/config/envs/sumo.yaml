env: sumo #  second load



t_max: 3600 # train for 500 epochs

env_args:
  net_file: maps/jinan12/anon_3_4_jinan_real_6269.net.xml
  route_file:  maps/jinan12/anon_3_4_jinan_real_6269.rou.xml
  use_gui : False
  num_seconds: 3600 # one hour
  yellow_time: 2
  delta_time: 5
  min_green: 5
  observation_type: QueueLengthNormalizedObservationFunction #        help="type of observation, can be DefaultObservationFunction, QueueLengthNormalizedObservationFunction, QueueLengthAndPhaseAndMinGreenTimeObservationFunction, QueueLengthObservationFunction, DensityObservationFunction, NumberCarObservationFunction, PressureObservationFunction, AverageSpeedObservationFunction, AccumulateWaitingTimeObservationFunction"
  waiting_time_memory: 3600
  add_system_info: True
  reward_fn: diff-waiting-time #         help="type of reward, can be diff-waiting-time, average-speed, queue, pressure, waiting-time"
  sumo_warnings: False
  add_per_agent_info: False
  single_agent: False