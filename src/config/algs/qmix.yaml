# --- QMIX specific parameters ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 108000

runner: "episode"

buffer_size: 300

# update the target network every {} episodes
target_update_interval: 50

# use the Q_Learner to train
agent_output_type: "q"
learner: "q_learner"
double_q: False
mixer: "qmix"
mixing_embed_dim: 64
hypernet_layers: 2
hypernet_embed: 64

name: "qmix"
